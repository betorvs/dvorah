---
# Default values for dvorah.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: ghcr.io/betorvs/dvorah
  # This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  privileged: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 8443

  metrics:
    port: 8080


resources: 
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  limits:
    memory: 48Mi
  requests:
    cpu: 100m
    memory: 48Mi

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  httpGet:
    path: /healthz
    port: metrics
readinessProbe:
  httpGet:
    path: /healthz
    port: metrics

# This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}


dockerConfig: |
  {"credHelpers": {"123456789123.dkr.ecr.us-east-1.amazonaws.com": "ecr-login"}}


certificate:
  enabled: false

cosign:
  publicKey: |
    
env:
  enabled: false
  # content examples:
  # content: |
  # - name: AWS_ROLE_ARN
  #   value: "arn:aws:iam::123456789123:role/dvorah"
  # - name: AWS_ACCESS_KEY_ID
  #   valueFrom:
      # secretKeyRef:
        # name: aws-credentials
        # key: AWS_ACCESS_KEY_ID
  # - name: AWS_SECRET_ACCESS_KEY
    # valueFrom:
      # secretKeyRef:
        # name: aws-credentials
        # key: AWS_SECRET_ACCESS_KEY
  # - name: AWS_REGION
    # value: us-east-1
  # - name: AWS_SESSION_TOKEN
    # valueFrom:
      # secretKeyRef:
        # name: aws-credentials
        # key: AWS_SESSION_TOKEN
  content:
    - name: BEE_JOB
      value: "cosign-review"
    - name: BEE_SERVICE
      value: "dvorah.dvorah.svc"
    - name: BEE_RESOURCE_KIND
      value: "statefulset"
    - name: BEE_PORT
      value: "8443"

dockerSecret:
  enabled: false
  # example of kubernetes.io/dockerconfigjson
  # value enabled add DOCKER_CONFIG environment variable and unmount defaut docker config from dvorah config map
  # create secret: kubectl create secret docker-registry -n dvorah dvorah-auth --docker-server=https://index.docker.io/v1/ --docker-username=USERNAME --docker-password=PASSWORD

args:
  enabled: true
  # This is for the mode of the dvorah. 
  # "audit" - audit all requests
  # "deny" - deny all requests
  mode: "audit"
  cert: "/etc/dvorah/certs/tls.crt"
  key: "/etc/dvorah/certs/tls.key"
  publicKey: "/cosign/cosign.pub"
  registry: "123456789123.dkr.ecr.us-east-1.amazonaws.com"
  logLevel: "debug"
  # number of cache entries
  digestCacheSize: 1000
  # ttl in hours 
  digestCacheTTL: 12
  # number of cache entries
  tagCacheSize: 1000
  # ttl in hours 
  tagCacheTTL: 12
  # number of cache entries
  ownerCacheSize: 1000
  # ttl in hours 
  ownerCacheTTL: 12
  # disable/enable tag cache
  useTagCache: false
  policyConfig: false
  policyConfigContent: |
    globalMode: "deny"
    globalProvider: "open-registry"
    globalRegistries: 
      - "index.docker.io/betorvs"
    globalPublicKey: |
      -----BEGIN PUBLIC KEY-----
      MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEXBC/tG86ZkNXCMSODNnqWSv94czb
      QwYxG2qpcX90HRs3amRFfKMFcKWDNf3AmFmGRVySxvZYZ6ZR7WqYRTMm5Q==
      -----END PUBLIC KEY-----
    policies: null
  skipDvorahValidation: false
  
validatingWebhook:
  enabled: true
  failurePolicy: Ignore
  timeoutSeconds: 5
  fullReview: true
  caBundle: ""
  rules:
    - apiGroups: [""]
      apiVersions: ["v1"]
      operations: ["CREATE", "UPDATE"]
      resources: ["pods"]
    - apiGroups: ["apps"]
      apiVersions: ["v1"]
      operations: ["CREATE", "UPDATE"]
      resources: ["deployments", "replicasets", "daemonsets", "statefulsets"]
    - apiGroups: ["batch"]
      apiVersions: ["v1"]
      operations: ["CREATE", "UPDATE"]
      resources: ["jobs", "cronjobs"]

serviceMonitor:
  # labels: {}
  # endpoints: {}
  enabled: false
  namespace: dvorah
  endpoints:
    default:
      interval: 10s
      scrapeTimeout: 10s
      honorLabels: true
      path: /metrics
      port: metrics
      scheme: http
