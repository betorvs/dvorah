---
{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "dvorah.fullname" . }}
  namespace: {{ .Release.Namespace | default "firebolt-dvorah" }}
  labels:
    {{- include "dvorah.labels" . | nindent 4 }}
spec:
  endpoints:
    {{- values .Values.serviceMonitor.endpoints | toYaml | nindent 4 }}
  selector:
    matchLabels:
      {{- include "dvorah.selectorLabels" . | nindent 6 }}
{{- end }}