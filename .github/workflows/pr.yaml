---
name: pr
on:
  pull_request:
    branches:
      - main
    types:
      - edited
      - opened
      - reopened
      - synchronize

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@04b73464bb391d4059bd26b0524d20df3927bd417  # v6.3.0
        with:
          go-version: '1.25'
          cache: false
      # https://github.com/golangci/golangci-lint-action/issues/953
      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20  # v9.2.0
        with:
          version: v2.11
          args: --timeout=10m
  e2e-test:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # install Task
      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611  # v2.0.0
      - uses: actions/setup-go@04b73464bb391d4059bd26b0524d20df3927bd417  # v6.3.0
        with:
          go-version: '1.25'
          cache: false
      - name: tidy
        run: |
          task tidy
      - name: e2e-unit-tests
        run: |
          task dvorah-e2e-test