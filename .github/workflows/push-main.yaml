---
name: push main
on:
  push:
    branches:
      - main

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: '1.26.1'
          cache: false
      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee  # v9.2.1
        with:
          version: v2.11
          args: --timeout=10m
      - name: Run Gosec Security Scanner
        uses: securego/gosec@9e6a9843d7a4a6e3e9a8539b02612c8a4aa3f889 # v2.27.1
        with:
          args: ./...
  e2e-test:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # install Task
      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611  # v2.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: '1.26'
          cache: false
      - name: tidy
        run: |
          task tidy
      - name: e2e-unit-tests
        run: |
          task dvorah-e2e-test

  build-image:
    needs: [golangci, "e2e-test"]
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write 

    name: build-image
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          driver-opts: |
            image=moby/buildkit:latest

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: docker_meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,format=long,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/ci-pipeline' }}
          labels: |
            org.opencontainers.image.description=Dvorah: A Zero Trust Kubernetes Admission Controller for Cosign signatures.
            org.opencontainers.image.verify-command=cosign verify ghcr.io/${{ github.repository }}:TAG --certificate-identity-regexp="^https://github.com/${{ github.repository }}/.github/workflows/pr.yaml@refs/pull/.*/merge$" --certificate-oidc-issuer=https://token.actions.githubusercontent.com
          annotations: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Dvorah - a Kubernetes Admission Controller for image signature verification. 

      - name: Build and Push container images
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        id: build-and-push
        with:
          context: .
          file: ./Dockerfiles/dvorah/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          annotations: ${{ steps.docker_meta.outputs.annotations }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign and verify the images with GitHub OIDC Token
        env:
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
          TAGS: ${{ steps.docker_meta.outputs.tags }}
        run: |
          IMAGE_NAME="ghcr.io/${{ github.repository }}"
          cosign sign --yes "${IMAGE_NAME}@${DIGEST}"
          
          cosign verify "${IMAGE_NAME}@${DIGEST}" \
          --certificate-identity-regexp="^https://github.com/${{ github.repository }}/.github/workflows/push-main.yaml@refs/heads/main" \
          --certificate-oidc-issuer=https://token.actions.githubusercontent.com
  semver:
    name: semver
    needs: ["build-image"]
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Bump version
        id: bump_version 
        run: |
          echo "Install semver"
          npm install semver
          ls -la $(pwd)/node_modules/semver/bin/
          export SEMVER_BIN=$(pwd)/node_modules/semver/bin/semver.js
          $SEMVER_BIN
          echo "semver installed: $SEMVER_BIN"
          export CHART_FILE="charts/dvorah/Chart.yaml"
          export CURRENT_VERSION=$(yq e '.version' "$CHART_FILE")
          COMMIT_MESSAGE=$(git log --no-merges -1 --pretty=%B | head -1)
          
          if [[ "$COMMIT_MESSAGE" == *"feat(major)"* ]]; then
            NEW_VERSION=$($SEMVER_BIN bump -i major "$CURRENT_VERSION")
          elif [[ "$COMMIT_MESSAGE" == *"feat"* ]]; then
            NEW_VERSION=$($SEMVER_BIN bump -i minor "$CURRENT_VERSION")
          else
            NEW_VERSION=$($SEMVER_BIN bump -i patch "$CURRENT_VERSION")
          fi
          echo $CHART_FILE $CURRENT_VERSION $COMMIT_MESSAGE $NEW_VERSION
          yq e -i ".version = \"$NEW_VERSION\"" "$CHART_FILE"
          yq e -i ".appVersion = \"$NEW_VERSION\"" "$CHART_FILE"
          echo "NEW_VERSION=$NEW_VERSION" >> "$GITHUB_ENV"
          echo "CHART_NAME=$CHART_NAME" >> "$GITHUB_ENV"
          echo "CURRENT_VERSION=$CURRENT_VERSION" >> "$GITHUB_ENV"

      - name: commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add charts/
          # Only commit and push if there are actual differences to avoid workflow failure
          git diff-index --quiet HEAD || (git commit -m "chore: automated file update" && git push)