# https://taskfile.dev

version: '3'

tasks:
  default:
    cmds:
      - task -a
    silent: true

  dependencies-install-mac:
    desc: Install dependencies
    cmds:
      - brew install kind
      - brew install helm
      - brew install tilt-dev/tap/ctlptl
      - brew install golangci-lint

  tidy:
    desc: update dependencies and tidy go modules 
    cmds:
      # - go get -u -v ./...
      - go mod tidy
  
  lint:
    desc: Run linters
    cmds:
      - golangci-lint run

  dev-create:
    desc: create a kind cluster (change to kind context)
    cmds:
      - ctlptl create registry ctlptl-registry --port=5005
      - ctlptl create cluster kind --registry=ctlptl-registry
      - kubectl config use-context kind-kind
      - kubectl create namespace dvorah

  dev-delete:
    desc: delete a kind cluster
    cmds:
      - ctlptl delete cluster kind
      - ctlptl delete registry ctlptl-registry

  dvorah-deploy:
    desc: Deploy dvorah
    cmds:
      - docker build -t dvorah/dvorah:{{.VERSION}} -f Dockerfiles/dvorah/Dockerfile .
      - docker tag dvorah/dvorah:{{.VERSION}} localhost:5005/dvorah/dvorah:{{.VERSION}}
      - docker push localhost:5005/dvorah/dvorah:{{.VERSION}}
      - kubectl config use-context kind-kind
      - bash scripts/dvorah-creds.sh
      - helm template dvorah charts/dvorah --set image.repository="ctlptl-registry:5000/dvorah/dvorah" --set image.tag={{.VERSION}} --set validatingWebhook.caBundle="$(cat tlsdvorah.crt | base64 )" -f values.kind.yaml --namespace dvorah > manifests-dvorah.yaml
      - kubectl apply -f manifests-dvorah.yaml -n dvorah
    vars:
      VERSION:
        sh: openssl rand -hex 4

  dvorah-delete:
    desc: Delete dvorah
    cmds:
      - kubectl delete -f manifests-dvorah.yaml -n dvorah
  
  dvorah-test-cosign:
    desc: Test dvorah with cosign review
    cmds:
      - kubectl port-forward -n dvorah service/dvorah 8443:8443 &
      - sleep 3
      - go run ./cmd/officer/main.go -job cosign-review -service localhost -port 8443 -kind pod -image digest -skip
      - pkill -f "kubectl port-forward"

  dvorah-test-warmup:
    desc: Warm up dvorah cache with test images
    cmds:
      - kubectl port-forward -n dvorah service/dvorah 8443:8443 &
      - sleep 3
      # Replace with your ECR registry address
      - go run ./cmd/officer/main.go -job warmup -service localhost -port 8443 -images "123456789123.dkr.ecr.us-east-1.amazonaws.com/nginx:1.27.2-alpine,123456789123.dkr.ecr.us-east-1.amazonaws.com/busybox:1.36.1"
      - pkill -f "kubectl port-forward"