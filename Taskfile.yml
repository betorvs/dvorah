# https://taskfile.dev

version: '3'

tasks:
  default:
    cmds:
      - task -a
    silent: true

  dependencies-install-mac:
    desc: Install dependencies
    cmds:
      - brew install kind
      - brew install helm
      - brew install tilt-dev/tap/ctlptl
      - brew install golangci-lint
      - go install github.com/securego/gosec/v2/cmd/gosec@latest

  tidy:
    desc: update dependencies and tidy go modules 
    cmds:
      # - go get -u -v ./...
      - go mod tidy
  
  lint:
    desc: Run linters
    cmds:
      - golangci-lint run

  sec:
    desc: run gosec 
    cmds:
      - gosec ./...

  dev-create:
    desc: create a kind cluster (change to kind context)
    cmds:
      - ctlptl create registry ctlptl-registry --port=5005
      - ctlptl create cluster kind --registry=ctlptl-registry
      - kubectl config use-context kind-kind
      - kubectl create namespace dvorah

  dev-delete:
    desc: delete a kind cluster
    cmds:
      - ctlptl delete cluster kind
      - ctlptl delete registry ctlptl-registry

  dvorah-deploy:
    desc: Deploy dvorah
    aliases:
      - deploy
    cmds:
      - docker build --build-arg VERSION={{.VERSION}} -t dvorah/dvorah:{{.VERSION}} -f Dockerfiles/dvorah/Dockerfile .
      - docker tag dvorah/dvorah:{{.VERSION}} localhost:5005/dvorah/dvorah:{{.VERSION}}
      - docker push localhost:5005/dvorah/dvorah:{{.VERSION}}
      - kubectl config use-context kind-kind
      - bash scripts/certs.sh
      - kubectl apply -f dvorah-certificates.yaml
      - helm template dvorah charts/dvorah --set image.repository="ctlptl-registry:5000/dvorah/dvorah" --set image.tag={{.VERSION}} --set validatingWebhook.caBundle="$(cat tls.crt | base64 )" --set args.policyConfig=true --set env.enabled=true --namespace dvorah > manifests-dvorah.yaml
      - kubectl apply -f manifests-dvorah.yaml -n dvorah
    vars:
      VERSION:
        sh: openssl rand -hex 4

  dvorah-delete:
    desc: Delete dvorah
    aliases:
      - delete
    cmds:
      - kubectl delete -f manifests-dvorah.yaml -n dvorah

  dvorah-logs:
    desc: Get logs from pod in Kind 
    aliases:
      - logs
    cmds:
      - kubectl logs -n dvorah -l app.kubernetes.io/name=dvorah
  
  dvorah-test-cosign:
    desc: Test dvorah with cosign review
    aliases:
      - cosign
    cmds:
      - kubectl exec -ti -n dvorah $(kubectl get pods -n dvorah | grep dvorah | awk '{print $1}') -- /bin/bee

  dvorah-test-warmup:
    desc: Warm up dvorah cache with test images
    cmds:
      - kubectl port-forward -n dvorah service/dvorah 8443:8443 &
      - sleep 3
      - go run ./cmd/bee/main.go -job warmup -service localhost -port 8443 -images "index.docker.io/betorvs/nginx:1.29.5@sha256:f676e65a102e4eb6b30ca6ece7300e1ad72bdd60758b8e4e5072c45b86979916"
      - pkill -f "kubectl port-forward"

  dvorah-e2e-test:
    desc: go e2e test
    aliases:
      - e2e
    cmds:
      - docker build -t betorvs/dvorah:{{.VERSION}} -f Dockerfiles/dvorah/Dockerfile .
      - VERSION={{ .VERSION }} go test -count=1 -timeout=10m -v bee_guard_test.go
    vars:
      VERSION:
        sh: openssl rand -hex 4